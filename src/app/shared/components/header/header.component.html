<header
  class="sticky top-0 z-50 w-full border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md"
>
  <div class="mx-auto flex h-16 w-full items-center justify-between px-6">
    <!-- Lado Izquierdo: Branding Minimalista -->
    <div class="flex items-center gap-4 md:gap-8">
      <!-- Botón de Menú Móvil -->
      <button
        (click)="toggleMenu.emit()"
        class="flex md:hidden p-2 text-zinc-400 hover:text-purple-400 hover:bg-zinc-900 rounded-lg transition-all duration-200"
      >
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <a routerLink="/dashboard" class="flex items-center gap-2.5 group">
        <!-- Isotipo: Un hexágono o detalle geométrico en Purple 500 con brillo sutil -->
        <div
          class="relative flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br from-purple-500 to-indigo-600 shadow-[0_0_15px_rgba(139,92,246,0.3)] transition-transform duration-300 group-hover:scale-105"
        >
          <span class="text-sm font-black text-white">V</span>
        </div>
        <!-- Logotipo -->
        <span
          class="text-lg font-semibold tracking-tight text-zinc-100 transition-colors group-hover:text-white"
        >
          VALKYRIE<span class="text-purple-500 font-light">.io</span>
        </span>
      </a>
    </div>

    <!-- Lado Derecho: Acciones y Perfil de Usuario -->
    <div class="flex items-center gap-4">
      <!-- Botón de Notificaciones (Con indicador en morado) -->
      <button
        class="relative p-2 text-zinc-400 hover:text-purple-400 rounded-lg hover:bg-zinc-900 transition-all duration-200"
      >
        <svg
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"
          />
        </svg>
        <span class="absolute top-1.5 right-1.5 flex h-2 w-2">
          <span
            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"
          ></span>
          <span
            class="relative inline-flex rounded-full h-2 w-2 bg-purple-500"
          ></span>
        </span>
      </button>

      <!-- Divisor vertical fino -->
      <div class="h-6 w-px bg-zinc-800"></div>

      <!-- Perfil de Usuario Desplegable -->
      <div class="relative">
        <button
          (click)="toggleUserMenu()"
          class="flex items-center gap-3 p-1 rounded-full hover:bg-zinc-900/50 transition-all duration-200 focus:outline-none"
        >
          <!-- Avatar con borde morado degradado -->
          <div
            class="relative p-[1.5px] rounded-full bg-gradient-to-tr from-purple-500 to-zinc-800"
          >
            <img
              [src]="avatarTemp"
              alt="Avatar Image"
              class="h-8 w-8 rounded-full object-cover"
            />
          </div>
          <div class="hidden sm:block text-left pr-2">
            <p class="text-xs font-medium text-zinc-200">
              {{ authSvc.user()?.name }} {{ authSvc.user()?.lastname }}
            </p>
            <p
              class="text-[10px] text-zinc-500 tracking-wide font-mono uppercase"
            >
              {{ authSvc.user()?.role }}
            </p>
          </div>
        </button>

        <!-- Dropdown Menu (Animado/Condicional) -->
        @if (showUserMenu()) {
          <div
            (mouseleave)="showUserMenu.set(false)"
            class="absolute right-0 mt-2.5 w-52 origin-top-right rounded-xl border border-zinc-800 bg-zinc-950 p-1.5 shadow-[0_10px_40px_rgba(0,0,0,0.8)] focus:outline-none animate-in fade-in slide-in-from-top-1 duration-150"
          >
            <div class="px-3 py-2 border-b border-zinc-900 mb-1">
              <p class="text-xs text-zinc-500">Sesión iniciada como</p>
              <p class="text-xs font-semibold text-zinc-300 truncate">
                {{ authSvc.user()?.email }}
              </p>
            </div>

            <a
              routerLink="/profile"
              class="flex items-center gap-2 px-3 py-2 text-xs text-zinc-400 hover:text-purple-400 hover:bg-purple-500/5 rounded-lg transition-colors"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
              Mi Perfil
            </a>
            <a
              routerLink="/settings"
              class="flex items-center gap-2 px-3 py-2 text-xs text-zinc-400 hover:text-purple-400 hover:bg-purple-500/5 rounded-lg transition-colors"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
                />
              </svg>
              Configuración
            </a>

            <div class="h-px bg-zinc-900 my-1"></div>

            <button
              (click)="logout()"
              class="flex w-full items-center gap-2 px-3 py-2 text-xs text-red-400 hover:bg-red-500/5 rounded-lg transition-colors text-left cursor-pointer"
            >
              <svg
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.5"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
                />
              </svg>
              Cerrar Sesión
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
