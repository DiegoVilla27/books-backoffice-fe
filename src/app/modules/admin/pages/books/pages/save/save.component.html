<div class="w-full mx-auto space-y-8 animate-fade-in">
  <!-- Header -->
  <app-page-header
    [title]="isEditMode() ? 'Editar libro' : 'Nuevo libro'"
    [description]="
      isEditMode()
        ? 'Modifica los detalles de este libro del catálogo.'
        : 'Registra un nuevo ejemplar bajo tu perfil de administrador.'
    "
    [showNewButton]="false"
  />

  @if (isInitialLoading()) {
    <div
      class="flex h-64 items-center justify-center text-zinc-500 font-mono text-xs"
    >
      Cargando perfil de usuario...
    </div>
  } @else {
    <!-- Formulario Principal -->
    <form
      [formGroup]="bookForm"
      (ngSubmit)="onSubmit()"
      novalidate
      class="rounded-2xl border border-zinc-900 bg-zinc-950/40 p-6 md:p-8 backdrop-blur-md space-y-6 mt-8"
    >
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        <!-- Input CVA: Título -->
        <app-input
          formControlName="title"
          label="Título del Libro"
          placeholder="ej: El Resplandor"
          [parentForm]="bookForm"
          [errorsMap]="validations"
          controlName="title"
        ></app-input>

        <!-- Input CVA: Autor -->
        <app-input
          formControlName="author"
          label="Autor"
          placeholder="ej: Stephen King"
          [parentForm]="bookForm"
          [errorsMap]="validations"
          controlName="author"
        ></app-input>
      </div>

      <!-- Info de Solo Lectura: Creador del Registro (Inmutable) -->
      <div
        class="rounded-xl border border-zinc-900 bg-zinc-950/80 p-4 flex items-center justify-between grid grid-cols-12"
      >
        <div class="flex items-center gap-3 col-span-12 md:col-span-6">
          <div
            class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-purple-500/10 border border-purple-500/20 text-purple-400"
          >
            <svg
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17.982 18.725A7.488 7.488 0 0012 15.75a7.488 7.488 0 00-5.982 2.975m11.963 0a9 9 0 10-11.963 0m11.963 0A8.966 8.966 0 0112 21a8.966 8.966 0 01-5.982-2.275M15 9.75a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
          </div>
          <div>
            <h4
              class="text-xs font-semibold text-zinc-300 font-mono uppercase tracking-wider"
            >
              Autoría del Registro
            </h4>
            <p class="text-xs text-zinc-500 mt-0.5">
              {{
                isEditMode()
                  ? "Este registro fue creado para:"
                  : "Este nuevo registro se guardará bajo la firma de:"
              }}
            </p>
          </div>
        </div>

        <app-select
          placeholder="Selecciona el usuario"
          [options]="users()"
          [virtualized]="true"
          formControlName="userId"
          label="Usuario"
          [parentForm]="bookForm"
          [errorsMap]="validations"
          controlName="userId"
          class="col-span-12 md:col-span-6"
        />
      </div>

      <!-- 3. Botonera -->
      <div
        class="flex items-center justify-end gap-3 border-t border-zinc-900/60 pt-6"
      >
        <button
          type="button"
          [routerLink]="routeBooks"
          class="px-5 py-2.5 rounded-xl border border-zinc-900 text-sm font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-900/40 transition-all"
        >
          Cancelar
        </button>

        <button
          type="submit"
          [disabled]="isSubmitting()"
          class="relative group overflow-hidden rounded-xl bg-purple-500 px-6 py-2.5 text-sm font-semibold text-white shadow-[0_0_20px_rgba(139,92,246,0.2)] transition-all duration-300 hover:scale-[1.01] hover:shadow-[0_0_25px_rgba(139,92,246,0.4)] disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <div
            class="absolute inset-0 bg-gradient-to-r from-purple-400 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
          ></div>
          <span class="relative flex items-center justify-center gap-2">
            @if (isSubmitting()) {
              <svg
                class="animate-spin h-4 w-4 text-white"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
            }

            {{
              isSubmitting()
                ? "Guardando..."
                : isEditMode()
                  ? "Guardar Cambios"
                  : "Añadir Libro"
            }}
          </span>
        </button>
      </div>
    </form>
  }
</div>
