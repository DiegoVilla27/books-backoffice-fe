<div class="relative w-full max-w-md mx-auto px-4 space-y-8 animate-fade-in">
  <!-- Encabezado / Logo -->
  <div class="text-center">
    <div
      class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-purple-500/10 to-indigo-500/10 border border-purple-500/30 text-purple-400 mb-4 shadow-[0_0_20px_rgba(139,92,246,0.15)]"
    >
      <svg
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z"
        />
      </svg>
    </div>
    <h2 class="text-3xl font-extrabold tracking-tight text-zinc-100">
      Panel de
      <span
        class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500"
        >Control</span
      >
    </h2>
    <p class="text-sm text-zinc-500 mt-2">
      Accede con tus credenciales de administrador.
    </p>
  </div>

  <!-- Tarjeta del Formulario -->
  <form
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    novalidate
    class="rounded-2xl border border-zinc-900 bg-zinc-950/40 p-6 md:p-8 backdrop-blur-md space-y-6 shadow-2xl"
  >
    <div class="space-y-5 flex gap-2 flex-col">
      <!-- Input: Email -->
      <app-input
        formControlName="email"
        type="email"
        label="Correo Electrónico"
        placeholder="ej: diego@cabuweb.com"
        [parentForm]="loginForm"
        [errorsMap]="validations"
        controlName="email"
      ></app-input>

      <!-- Input: Contraseña -->
      <app-input
        formControlName="password"
        type="password"
        label="Contraseña"
        placeholder="••••••••"
        [parentForm]="loginForm"
        [errorsMap]="validations"
        controlName="password"
      ></app-input>
    </div>

    <!-- Botón de Acceso -->
    <button
      type="submit"
      [disabled]="isSubmitting()"
      class="w-full relative group overflow-hidden rounded-xl bg-purple-500 mt-2 py-3 text-sm font-semibold text-white shadow-[0_0_20px_rgba(139,92,246,0.2)] transition-all duration-300 hover:scale-[1.01] hover:shadow-[0_0_25px_rgba(139,92,246,0.4)] disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <div
        class="absolute inset-0 bg-gradient-to-r from-purple-400 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
      ></div>
      <span class="relative flex items-center justify-center gap-2">
        @if (isSubmitting()) {
          <svg
            class="animate-spin h-4 w-4 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        }
        {{ isSubmitting() ? "Iniciando Sesión..." : "Iniciar Sesión" }}
      </span>
    </button>

    <!-- Enlace a Registro -->
    <div class="text-center pt-4 border-t border-zinc-900/60">
      <p class="text-xs text-zinc-500">
        ¿No tienes una cuenta?
        <a
          routerLink="/auth/register"
          class="text-purple-400 hover:text-purple-300 font-semibold transition-colors"
          >Regístrate ahora</a
        >
      </p>
    </div>
  </form>
</div>
