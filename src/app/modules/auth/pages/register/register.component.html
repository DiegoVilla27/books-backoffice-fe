<div class="relative w-full max-w-xl mx-auto px-4 space-y-8 animate-fade-in">
  <!-- Encabezado / Logo -->
  <div class="text-center">
    <div
      class="inline-flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-purple-500/10 to-indigo-500/10 border border-purple-500/30 text-purple-400 mb-4 shadow-[0_0_20px_rgba(139,92,246,0.15)]"
    >
      <svg
        class="h-6 w-6"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-9-3.5h.008v.008H12V4.25m.007 11.75h.008v.008H12v-.008Zm0-3.5h.008v.008H12v-.008Zm0-3.5h.008v.008H12v-.008Zm0-3.5h.008v.008H12v-.008ZM12 8.25a.75.75 0 100-1.5.75.75 0 000 1.5Zm0 3.5a.75.75 0 100-1.5.75.75 0 000 1.5Zm0 3.5a.75.75 0 100-1.5.75.75 0 000 1.5Z"
        />
      </svg>
    </div>
    <h2 class="text-3xl font-extrabold tracking-tight text-zinc-100">
      Crea tu
      <span
        class="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500"
        >Cuenta</span
      >
    </h2>
    <p class="text-sm text-zinc-500 mt-2">
      Introduce tus datos para registrarte en el sistema.
    </p>
  </div>

  <!-- Tarjeta del Formulario -->
  <form
    [formGroup]="registerForm"
    (ngSubmit)="onSubmit()"
    novalidate
    class="rounded-2xl border border-zinc-900 bg-zinc-950/40 p-6 md:p-8 backdrop-blur-md space-y-6 shadow-2xl"
  >
    <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
      <!-- Input: Nombre -->
      <app-input
        formControlName="name"
        label="Nombre"
        placeholder="ej: Diego"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="name"
      ></app-input>

      <!-- Input: Apellido -->
      <app-input
        formControlName="lastname"
        label="Apellido"
        placeholder="ej: Villa"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="lastname"
      ></app-input>

      <!-- Input: Email -->
      <app-input
        class="md:col-span-2"
        formControlName="email"
        type="email"
        label="Correo Electrónico"
        placeholder="ej: diego@cabuweb.com"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="email"
      ></app-input>

      <!-- Input: Contraseña -->
      <app-input
        formControlName="password"
        type="password"
        label="Contraseña"
        placeholder="••••••••"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="password"
      ></app-input>

      <!-- Input: Confirmar Contraseña -->
      <app-input
        formControlName="passwordConfirmation"
        type="password"
        label="Confirmar Contraseña"
        placeholder="••••••••"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="passwordConfirmation"
      ></app-input>

      <!-- Input: Edad -->
      <app-input
        class="md:col-span-2"
        formControlName="age"
        type="number"
        label="Edad"
        placeholder="ej: 25"
        [parentForm]="registerForm"
        [errorsMap]="validations"
        controlName="age"
      ></app-input>
    </div>

    <!-- Botón de Envío -->
    <button
      type="submit"
      [disabled]="isSubmitting()"
      class="w-full relative group overflow-hidden rounded-xl bg-purple-500 py-3 text-sm font-semibold text-white shadow-[0_0_20px_rgba(139,92,246,0.2)] transition-all duration-300 hover:scale-[1.01] hover:shadow-[0_0_25px_rgba(139,92,246,0.4)] disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <div
        class="absolute inset-0 bg-gradient-to-r from-purple-400 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
      ></div>
      <span class="relative flex items-center justify-center gap-2">
        @if (isSubmitting()) {
          <svg
            class="animate-spin h-4 w-4 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
            ></path>
          </svg>
        }
        {{ isSubmitting() ? "Registrando..." : "Registrarse" }}
      </span>
    </button>

    <!-- Redirección a Login -->
    <div class="text-center pt-4 border-t border-zinc-900/60">
      <p class="text-xs text-zinc-500">
        ¿Ya tienes cuenta?
        <a
          routerLink="/auth/login"
          class="text-purple-400 hover:text-purple-300 font-semibold transition-colors"
          >Inicia sesión aquí</a
        >
      </p>
    </div>
  </form>
</div>
